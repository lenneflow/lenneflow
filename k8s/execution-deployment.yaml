apiVersion: apps/v1
kind: Deployment
metadata:
  name: execution-service
  labels:
    app: execution-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: execution-service
  template:
    metadata:
      labels:
        app: execution-service
    spec:
      serviceAccountName: lenneflow-sa
      containers:
      - name: execution-service
        image: lenneflow/execution-service
        ports:
        - containerPort: 47002
        resources:
          requests:
            cpu: "0.2"
            memory: 300Mi
          limits:
            cpu: "1.0"
            memory: 300Mi
        readinessProbe:
            httpGet:
              port: 47002
              path: /actuator/health
            initialDelaySeconds: 60
            timeoutSeconds: 2
            periodSeconds: 20
            failureThreshold: 5
        livenessProbe:
            httpGet:
              port: 47002
              path: /actuator/info
            initialDelaySeconds: 60
            timeoutSeconds: 2
            periodSeconds: 20
            failureThreshold: 5
        volumeMounts:
            - name: mongodb
              mountPath: /etc/secretspot
          #            - name: config
          #              mountPath: /etc/appconfig
        env:
            - name: SPRING_CLOUD_BOOTSTRAP_ENABLED
              value: "true"
            - name: SPRING_CLOUD_KUBERNETES_SECRETS_ENABLEAPI
              value: "true"
          #          - name: SPRING_CONFIG_IMPORT
          #            value: "kubernetes:"
      volumes:
            - name: mongodb
              secret:
                secretName: execution-service
          #        - name: config
          #          configMap:
          #            name: department